version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: recruitai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       recruitai
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-recruitai_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recruitai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitai_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:                  postgresql://postgres:${DB_PASSWORD:-recruitai_password}@db:5432/recruitai
      SECRET_KEY:                    ${SECRET_KEY:-change-this-secret-key-in-production-32chars}
      ALGORITHM:                     HS256
      ACCESS_TOKEN_EXPIRE_MINUTES:   10080
      UPLOAD_DIR:                    /app/uploads
      MAX_UPLOAD_SIZE_MB:            10
      CORS_ORIGINS:                  http://localhost,http://localhost:80,http://frontend
    volumes:
      - resume_uploads:/app/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── React Frontend (nginx) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""      # empty = uses /api proxy through nginx
    container_name: recruitai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  # ── DB seeder (runs once then exits) ─────────────
  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitai_seeder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-recruitai_password}@db:5432/recruitai
    command: python seed.py
    restart: "no"

volumes:
  postgres_data:
  resume_uploads:
