version: "3.9"

# Dev override — hot reload + volume mounts
services:

  db:
    image: postgres:15-alpine
    container_name: recruitai_db_dev
    environment:
      POSTGRES_DB:       recruitai
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitai_backend_dev
    depends_on:
      - db
    environment:
      DATABASE_URL:                postgresql://postgres:devpassword@db:5432/recruitai
      SECRET_KEY:                  dev-secret-key-not-for-production
      ALGORITHM:                   HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      UPLOAD_DIR:                  /app/uploads
      MAX_UPLOAD_SIZE_MB:          10
      CORS_ORIGINS:                http://localhost:5173,http://localhost:3000
    volumes:
      - ./backend:/app
      - resume_dev_uploads:/app/uploads
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_dev_data:
  resume_dev_uploads:
